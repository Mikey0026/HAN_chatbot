# =============================================================================
# Configuration for the HAN Internship Support Agent
# All tunable parameters live here so we can sweep them during evaluation
# without grepping through code.
# =============================================================================

# --- Models (served by local Ollama) ---
llm_model: "llama3.1:8b"
embedding_model: "nomic-embed-text"

# --- Generation ---
# Low temperature → less hallucination, more deterministic answers.
# Important for a grounded RAG system.
temperature: 0.1

# --- Retrieval ---
# How many chunks to pull from the vector store per question.
# Start at 4; tune during the Evaluation phase.
retrieval_k: 4

# --- Chunking (RecursiveCharacterTextSplitter for PDFs) ---
# 800 chars (~150 tokens) is a reasonable middle ground for academic / policy
# text — large enough to keep a paragraph intact, small enough to stay focused.
# Overlap of 150 preserves continuity across boundaries.
chunk_size: 800
chunk_overlap: 150

# --- Paths (relative to the project root) ---
raw_pdf_dir: "data/raw"
faq_dir: "data/faq"
vector_store_dir: "chroma_db"
collection_name: "han_internship"
